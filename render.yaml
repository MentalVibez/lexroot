services:
  - type: web
    name: pensiveape-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    domains:
      - api.pensiveape.com
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://pensiveape.com,https://www.pensiveape.com
      - key: ENABLE_NEO4J
        value: "false"
      - key: ENABLE_OLLAMA
        value: "false"
      - key: ENABLE_WRITE_ENDPOINTS
        value: "false"
      - key: REQUIRE_API_KEY
        value: "false"
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: ADMIN_API_TOKEN
        generateValue: true
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: living-lexicon-db
          property: connectionString
      - key: POSTGRES_URL
        fromDatabase:
          name: living-lexicon-db
          property: connectionString
      - key: POSTGRES_SYNC_URL
        fromDatabase:
          name: living-lexicon-db
          property: connectionString

  - type: static
    name: pensiveape-web
    buildCommand: ""
    staticPublishPath: frontend
    domains:
      - pensiveape.com
      - www.pensiveape.com

databases:
  - name: living-lexicon-db
    databaseName: living_lexicon
    user: lexicon
    plan: basic-256mb
    region: oregon
