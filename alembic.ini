[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Read from POSTGRES_SYNC_URL env var in env.py — this value is a fallback for
# alembic commands run without the env var set.
sqlalchemy.url = postgresql://lexicon:change_me@localhost:5432/living_lexicon

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
